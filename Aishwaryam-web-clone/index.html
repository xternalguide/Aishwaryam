<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <script>
      function adjustViewportHeight() {
        var vh = window.innerHeight;
        document.documentElement.style.setProperty('--vh', vh + 'px');
        document.documentElement.style.height = vh + 'px';
        document.body.style.height = vh + 'px';
        var root = document.getElementById('root');
        if (root) {
          root.style.height = vh + 'px';
        }
      }
      window.addEventListener('resize', adjustViewportHeight);
      window.addEventListener('orientationchange', adjustViewportHeight);
      document.addEventListener('DOMContentLoaded', adjustViewportHeight);
      // Run immediately
      adjustViewportHeight();
      // Keep checking to ensure perfect sync on layout shifts
      setInterval(adjustViewportHeight, 250);
    </script>
    <title>Aishwaryam Digital Gold</title>
    <!-- Google Fonts: Montserrat & Lora (Roman pairing) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
