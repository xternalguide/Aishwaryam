<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <title>Aishwaryam Digital Gold</title>
    <!-- Google Fonts: Montserrat & Lora (Roman pairing) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  </head>
  <body>
    <script>
      (function() {
        var isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
        var userAgent = navigator.userAgent || '';
        
        // Match standard browser WebView tokens (wv / Version/4.0) or our custom AishwaryamAPK token
        var isCapacitor = !!window.Capacitor || 
                          userAgent.indexOf('Capacitor') !== -1 || 
                          userAgent.indexOf('AishwaryamAPK') !== -1 || 
                          userAgent.indexOf('wv') !== -1 || 
                          userAgent.indexOf('Version/4.0') !== -1;

        if (!isLocalhost && !isCapacitor) {
          // Immediately block the page and render brand-colored 403 styling (Purple & Gold)
          document.body.innerHTML = 
            '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:linear-gradient(135deg, #29001D 0%, #4A0E4E 100%);font-family:sans-serif;color:#E5E7EB;padding:24px;text-align:center;">' +
              '<h1 style="font-size:72px;font-weight:900;color:#FFD700;margin:0 0 16px 0;letter-spacing:-1px;text-shadow:0 4px 12px rgba(255,215,0,0.15)">403</h1>' +
              '<h2 style="font-size:22px;font-weight:700;color:#FFFFFF;margin:0 0 12px 0;">Access Denied</h2>' +
              '<p style="font-size:14px;color:#D1D5DB;max-width:320px;line-height:22px;margin:0;">This application is restricted. Please install and run the official mobile app from the Google Play Store.</p>' +
            '</div>';
          
          // Stop downloading or executing any further scripts (like main.tsx)
          window.stop();
          throw new Error("Access Denied: Web-browser rendering is disabled in production.");
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
