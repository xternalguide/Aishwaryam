<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aishwaryam Admin — Secure Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0b0d;
      --card-bg: rgba(18, 18, 22, 0.65);
      --text: #f3f4f6;
      --text-muted: #9ca3af;
      --accent: #d4af37;
      --accent-hover: #f3cf65;
      --accent-glow: rgba(212, 175, 55, 0.25);
      --red: #ef4444;
      --red-glow: rgba(239, 68, 68, 0.2);
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Ambient background bubbles */
    .bg-glow {
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(212, 175, 55, 0.08) 0%, rgba(212, 175, 55, 0) 70%);
      top: -150px;
      left: -150px;
      z-index: 1;
      animation: float-slow 20s infinite alternate ease-in-out;
    }

    .bg-glow-secondary {
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.05) 0%, rgba(99, 102, 241, 0) 70%);
      bottom: -150px;
      right: -150px;
      z-index: 1;
      animation: float-slow 25s infinite alternate-reverse ease-in-out;
    }

    @keyframes float-slow {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(100px, 50px) scale(1.15); }
    }

    /* Outer wrapper for centering and relative position */
    .login-container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 440px;
      padding: 20px;
    }

    /* Frosted glass card */
    .glass-card {
      background: var(--card-bg);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: var(--radius);
      padding: 40px 32px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 
                  0 0 40px 0 rgba(212, 175, 55, 0.04);
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .glass-card.shake {
      animation: shake 0.4s ease-in-out;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-10px); }
      40%, 80% { transform: translateX(10px); }
    }

    /* Logo & Header */
    .brand-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-mark {
      width: 54px;
      height: 54px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), #aa7c11);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 24px rgba(212, 175, 55, 0.25);
      margin-bottom: 16px;
    }

    .logo-mark svg {
      width: 28px;
      height: 28px;
      fill: none;
      stroke: #fff;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .brand-title {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #fff;
      margin-bottom: 6px;
    }

    .brand-subtitle {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* Form Fields */
    .form-group {
      margin-bottom: 22px;
      position: relative;
    }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 8px;
      letter-spacing: 0.3px;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-icon {
      position: absolute;
      left: 14px;
      width: 18px;
      height: 18px;
      color: var(--text-muted);
      pointer-events: none;
      transition: color 0.2s;
    }

    .form-control {
      width: 100%;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      padding: 13px 16px 13px 44px;
      color: #fff;
      font-size: 14.5px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background-color 0.2s;
    }

    .form-control:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
      background-color: rgba(255, 255, 255, 0.06);
    }

    .form-control:focus + .input-icon {
      color: var(--accent);
    }

    /* Password visibility toggle */
    .eye-toggle {
      position: absolute;
      right: 14px;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px;
      border-radius: 4px;
      transition: color 0.2s;
      outline: none;
    }

    .eye-toggle:hover {
      color: var(--text);
    }

    .eye-toggle svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
    }

    /* Error Badge */
    .error-badge {
      background: var(--red-glow);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 13px;
      color: #fca5a5;
      display: none;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
      animation: fadeIn 0.3s forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .error-badge svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      flex-shrink: 0;
    }

    /* Button */
    .btn-login {
      width: 100%;
      background: linear-gradient(135deg, var(--accent), #b89225);
      border: none;
      border-radius: 10px;
      padding: 14px;
      color: #0b0b0d;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.3px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: transform 0.15s, opacity 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2);
    }

    .btn-login:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(212, 175, 55, 0.3);
      opacity: 0.95;
    }

    .btn-login:active {
      transform: translateY(1px);
    }

    /* Loading state */
    .btn-login.loading {
      pointer-events: none;
      opacity: 0.8;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(11, 11, 13, 0.25);
      border-top-color: #0b0b0d;
      border-radius: 50%;
      animation: spin 0.8s infinite linear;
      display: none;
    }

    .btn-login.loading .spinner {
      display: inline-block;
    }

    .btn-login.loading .btn-text {
      opacity: 0.7;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <!-- Ambient Light Effects -->
  <div class="bg-glow"></div>
  <div class="bg-glow-secondary"></div>

  <div class="login-container">
    <div class="glass-card" id="loginCard">
      
      <!-- Brand Header -->
      <div class="brand-header">
        <div class="logo-mark">
          <svg viewBox="0 0 24 24">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            <path d="M12 8v4"/>
            <path d="M12 16h.01"/>
          </svg>
        </div>
        <h1 class="brand-title">Aishwaryam</h1>
        <p class="brand-subtitle">Aishwaryam @ Your Home</p>
      </div>

      <!-- Error Message -->
      <div class="error-badge" id="errorBadge">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12=" y2="16"/>
        </svg>
        <span id="errorText">Invalid username or password.</span>
      </div>

      <!-- Form -->
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label" for="email">Admin Email ID</label>
          <div class="input-wrapper">
            <input type="email" class="form-control" id="email" placeholder="name@aishwaryam.com" required autocomplete="username">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
          </div>
        </div>

        <div class="form-group" style="margin-bottom: 28px;">
          <label class="form-label" for="password">Password</label>
          <div class="input-wrapper">
            <input type="password" class="form-control" id="password" placeholder="••••••••••••" required autocomplete="current-password">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <button type="button" class="eye-toggle" id="eyeToggle" onclick="togglePasswordVisibility()">
              <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-login" id="submitBtn">
          <span class="spinner"></span>
          <span class="btn-text">Authenticate</span>
        </button>
      </form>

    </div>
  </div>

  <script>
    // Double-check if already logged in, bypass if so
    if (localStorage.getItem('aishwaryam-admin-auth') === 'true') {
      window.location.href = 'index.html';
    }

    function togglePasswordVisibility() {
      const passwordInput = document.getElementById('password');
      const eyeIcon = document.getElementById('eyeIcon');
      
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        // eye open svg
        eyeIcon.innerHTML = `
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        `;
      } else {
        passwordInput.type = 'password';
        // eye closed svg
        eyeIcon.innerHTML = `
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
          <line x1="1" y1="1" x2="23" y2="23"/>
        `;
      }
    }

    async function handleLogin(e) {
      e.preventDefault();
      
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const card = document.getElementById('loginCard');
      const submitBtn = document.getElementById('submitBtn');
      const errorBadge = document.getElementById('errorBadge');
      const errorText = document.getElementById('errorText');

      // Clear previous error states
      errorBadge.style.display = 'none';
      card.classList.remove('shake');

      // Show loader
      submitBtn.classList.add('loading');

      // Simulate a very premium secure authentication loading state (750ms latency)
      await new Promise(resolve => setTimeout(resolve, 750));

      // Credential verification
      if (email === 'blazewingwebs@gmail.com' && password === '12345@6789') {
        localStorage.setItem('aishwaryam-admin-auth', 'true');
        window.location.href = 'index.html';
      } else {
        submitBtn.classList.remove('loading');
        
        // Show elegant error feedback
        errorText.textContent = 'Invalid credentials. Please verify your Email or Password.';
        errorBadge.style.display = 'flex';
        
        // Add card shake effect
        card.classList.add('shake');
        
        // Force reflow and remove shake class so it can be re-triggered
        void card.offsetWidth;
      }
    }
  </script>
</body>
</html>
